name: Update daily feed

on:
  schedule:
    # 07:00 UTC every day — edit to taste (this is 12:30 PM IST)
    - cron: "0 7 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetcher
        run: python fetch.py

      - name: Commit updated data.json
        run: |
          git config user.name "dailyfeed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update feed data"
          git pull --rebase origin main
          git push

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
